name: Deploy Ninja Battle

on:
  push:
    branches: [main]

jobs:
  deploy-worker:
    name: Deploy Worker (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: worker

  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - uses: actions/checkout@v4

      - name: Inject WS URL into game.js
        run: |
          # Replace the WS_URL placeholder with the actual worker URL
          sed -i "s|window.WS_URL || \`wss://\${.*}\`|'wss://${{ secrets.CF_WORKER_URL }}/ws'|g" frontend/game.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy frontend --project-name=ninja-battle
